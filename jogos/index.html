<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joguinhos - Demo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .btn-jogar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 14px;
            font-family: 'Russo One', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-jogar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-jogar:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 40px;
            color: #475569;
            font-size: 0.75rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="material-icons" style="font-size:36px;vertical-align:middle;color:#818cf8;">sports_esports</span>
            Joguinhos
        </h1>
        <p class="subtitle">Mini-games extraidos do Super Cartola Manager</p>

        <button class="btn-jogar" onclick="window.abrirJoguinhos()">
            <span class="material-icons">play_arrow</span>
            Jogar
        </button>

        <div class="info">
            <p><strong>Jogos disponiveis:</strong></p>
            <p style="margin-top:8px;">
                <span class="material-icons" style="font-size:16px;vertical-align:middle;color:#10b981;">sports_soccer</span>
                <strong>Penaltis</strong> — Cobra ou defende penaltis (4 dificuldades)
            </p>
            <p style="margin-top:4px;">
                <span class="material-icons" style="font-size:16px;vertical-align:middle;color:#f59e0b;">pest_control</span>
                <strong>Escorpiao</strong> — Guie o escorpiao com o mouse
            </p>
        </div>
    </div>

    <!-- Scripts dos jogos -->
    <script src="penaltis.js"></script>
    <script src="escorpiao.js"></script>
    <script src="joguinhos-modal.js"></script>
</body>
</html>
